# .pre-commit-config.yaml
exclude: '^$'
fail_fast: false
repos:
  -   repo: local
      hooks:
        -   id: generate-openapi
            name: Generate OpenAPI spec
            language: script
            entry: scripts/generate-openapi.sh
            pass_filenames: false
            always_run: true
  -   repo: https://github.com/neuhalje/pre-commit-gradle.git
      rev: v0.0.1
      hooks:
        -   id: gradle-check